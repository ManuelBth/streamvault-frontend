<div class="p-6 max-w-2xl mx-auto">
  <!-- Header -->
  <div class="border-b border-gray-800 pb-4 mb-6">
    <h1 class="text-2xl font-bold text-white">Contact</h1>
    <p class="text-gray-400 mt-1">Send us a message</p>
  </div>

  @if (isSuccess()) {
    <!-- Success Message -->
    <div class="bg-green-900/30 border border-green-600 rounded-lg p-6 text-center">
      <div class="text-green-400 text-4xl mb-4">✓</div>
      <h2 class="text-xl font-semibold text-white mb-2">Email Sent!</h2>
      <p class="text-gray-400 mb-4">Your message has been sent successfully.</p>
      <button 
        (click)="reset()"
        class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-md transition-colors"
      >
        Send Another
      </button>
    </div>
  } @else {
    <!-- Contact Form -->
    <form (ngSubmit)="sendEmail()" class="space-y-6">
      <!-- To (readonly - we're sending to the configured address) -->
      <div>
        <label class="block text-gray-400 text-sm mb-2">To</label>
        <input 
          type="email" 
          [value]="to()"
          readonly
          class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-md text-gray-500 cursor-not-allowed"
        />
        <p class="text-gray-500 text-xs mt-1">You can only send emails to the configured address</p>
      </div>

      <!-- Subject -->
      <div>
        <label class="block text-gray-400 text-sm mb-2">Subject</label>
        <input 
          type="text" 
          [(ngModel)]="subject"
          name="subject"
          placeholder="Enter subject"
          class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-md text-white focus:outline-none focus:border-red-600"
        />
      </div>

      <!-- Body -->
      <div>
        <label class="block text-gray-400 text-sm mb-2">Message</label>
        <textarea 
          [(ngModel)]="body"
          name="body"
          placeholder="Enter your message..."
          rows="8"
          class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-md text-white focus:outline-none focus:border-red-600 resize-none"
        ></textarea>
      </div>

      <!-- Error Message -->
      @if (errorMessage()) {
        <div class="bg-red-900/30 border border-red-600 rounded-lg p-4 text-red-400">
          {{ errorMessage() }}
        </div>
      }

      <!-- Submit Button -->
      <button 
        type="submit"
        [disabled]="sending() || !subject() || !body()"
        class="w-full px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-md font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ sending() ? 'Sending...' : 'Send Email' }}
      </button>
    </form>
  }
</div>
