<div class="player-container relative w-full h-screen bg-black flex items-center justify-center">
  <!-- Video Element -->
  <video
    #videoElement
    class="w-full h-full object-contain"
    playsinline
    (click)="onVideoClick()"
    (mousemove)="onVideoMouseMove()"
  ></video>

  <!-- Loading State -->
  @if (isLoading()) {
    <div class="absolute inset-0 flex items-center justify-center bg-black/80 z-10">
      <div class="flex flex-col items-center gap-4">
        <div class="w-12 h-12 border-4 border-sv-primary border-t-transparent rounded-full animate-spin"></div>
        <span class="text-sv-text text-lg">Cargando video...</span>
      </div>
    </div>
  }

  <!-- Error State -->
  @if (hasError()) {
    <div class="absolute inset-0 flex items-center justify-center bg-black/90 z-10">
      <div class="flex flex-col items-center gap-4 text-center px-4">
        <svg class="w-16 h-16 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <div>
          <h3 class="text-sv-text text-xl font-bold mb-2">Error de reproducción</h3>
          <p class="text-sv-muted">{{ errorMessage() }}</p>
        </div>
        <div class="flex gap-3 mt-4">
          <button
            (click)="goBack()"
            class="px-6 py-2 bg-sv-surface text-sv-text rounded hover:bg-sv-card transition-colors"
          >
            ← Volver
          </button>
          <button
            (click)="retry()"
            class="px-6 py-2 bg-sv-primary text-sv-black font-bold rounded hover:bg-sv-primary/80 transition-colors"
          >
            Reintentar
          </button>
        </div>
      </div>
    </div>
  }

  <!-- Controls Overlay -->
  @if (showControls() && !isLoading() && !hasError()) {
    <div class="absolute inset-0 flex flex-col justify-end bg-gradient-to-t from-black/80 via-transparent to-transparent transition-opacity duration-300">
      <!-- Top Bar -->
      <div class="absolute top-0 left-0 right-0 p-4 flex items-center justify-between bg-gradient-to-b from-black/60 to-transparent">
        <button
          (click)="goBack()"
          class="flex items-center gap-2 text-sv-text hover:text-sv-primary transition-colors"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          <span class="text-lg">Volver</span>
        </button>
        
        <div class="text-sv-text text-sm">
          @if (episodeId()) {
            <span>Episodio: {{ episodeId() }}</span>
          }
        </div>
      </div>

      <!-- Center Play Button (when paused) -->
      @if (isPaused()) {
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <button
            (click)="togglePlay()"
            class="w-20 h-20 flex items-center justify-center bg-sv-primary/90 rounded-full hover:bg-sv-primary transition-transform hover:scale-110 pointer-events-auto"
          >
            <svg class="w-10 h-10 text-sv-black ml-1" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>
        </div>
      }

      <!-- Bottom Controls -->
      <div class="p-4 space-y-3">
        <!-- Progress Bar -->
        <div
          class="relative h-1 bg-white/30 rounded-full cursor-pointer group"
          (click)="seek($event)"
        >
          <!-- Buffered -->
          <div
            class="absolute h-full bg-white/50 rounded-full"
            [style.width.%]="bufferedPercent()"
          ></div>
          <!-- Progress -->
          <div
            class="absolute h-full bg-sv-primary rounded-full"
            [style.width.%]="progressPercent()"
          ></div>
          <!-- Thumb -->
          <div
            class="absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-sv-primary rounded-full opacity-0 group-hover:opacity-100 transition-opacity"
            [style.left.%]="progressPercent()"
          ></div>
        </div>

        <!-- Control Buttons -->
          <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <!-- Play/Pause -->
            <button
              (click)="togglePlay()"
              class="text-sv-text hover:text-sv-red transition-colors"
            >
              @if (isPlaying()) {
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
                </svg>
              } @else {
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M8 5v14l11-7z" />
                </svg>
              }
            </button>

            <!-- Skip Back -->
            <button
              (click)="skip(-10)"
              class="text-sv-text hover:text-sv-red transition-colors"
              title="-10 segundos"
            >
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z" />
              </svg>
            </button>

            <!-- Skip Forward -->
            <button
              (click)="skip(10)"
              class="text-sv-text hover:text-sv-red transition-colors"
              title="+10 segundos"
            >
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z" />
              </svg>
            </button>

            <!-- Time -->
            <span class="text-sv-text text-sm">
              {{ formattedCurrentTime() }} / {{ formattedDuration() }}
            </span>
          </div>

          <div class="flex items-center gap-4">
            <!-- Volume -->
            <div class="flex items-center gap-2 group">
              <button
                (click)="toggleMute()"
                class="text-sv-text hover:text-sv-red transition-colors"
              >
                @if (muted() || volume() === 0) {
                  <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                  </svg>
                } @else if (volume() < 0.5) {
                  <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z" />
                  </svg>
                } @else {
                  <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                  </svg>
                }
              </button>
              <input
                type="range"
                min="0"
                max="1"
                step="0.1"
                [value]="volume()"
                (input)="setVolume($event)"
                class="w-20 h-1 bg-white/30 rounded-full appearance-none cursor-pointer [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:bg-sv-red [&::-webkit-slider-thumb]:rounded-full group-hover:opacity-100 opacity-0 transition-opacity"
              />
            </div>

            <!-- Fullscreen -->
            <button
              (click)="toggleFullscreen()"
              class="text-sv-text hover:text-sv-primary transition-colors"
            >
              @if (isFullscreen()) {
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25" />
                </svg>
              } @else {
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                </svg>
              }
            </button>
          </div>
        </div>
      </div>
    </div>
  }
</div>
