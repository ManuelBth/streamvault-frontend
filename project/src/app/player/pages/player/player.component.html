<div class="player-container relative w-full h-[60vh] md:h-screen bg-black flex items-center justify-center" [class.pseudo-fullscreen]="controls.pseudoFullscreen()">
  <!-- Video Element -->
  <video
    #videoElement
    class="w-full h-full object-contain"
    playsinline
    (click)="onVideoClick()"
    (mousemove)="onVideoMouseMove()"
  ></video>

  <!-- Loading State -->
  @if (controls.isLoading()) {
    <div class="absolute inset-0 flex items-center justify-center bg-black/80 z-10">
      <div class="flex flex-col items-center gap-4">
        <div class="w-12 h-12 border-4 border-sv-primary border-t-transparent rounded-full animate-spin"></div>
        <span class="text-sv-text text-lg">Cargando video...</span>
      </div>
    </div>
  }

  <!-- Error State -->
  @if (controls.hasError()) {
    <div class="absolute inset-0 flex items-center justify-center bg-black/90 z-10">
      <div class="flex flex-col items-center gap-4 text-center px-4">
        <svg class="w-16 h-16 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <div>
          <h3 class="text-sv-text text-xl font-bold mb-2">Error de reproducción</h3>
          <p class="text-sv-muted">{{ controls.errorMessage() }}</p>
        </div>
        <div class="flex gap-3 mt-4">
          <button
            (click)="goBack()"
            class="px-6 py-2 bg-sv-surface text-sv-text rounded hover:bg-sv-card transition-colors"
          >
            ← Volver
          </button>
          <button
            (click)="retry()"
            class="px-6 py-2 bg-sv-primary text-sv-black font-bold rounded hover:bg-sv-primary/80 transition-colors"
          >
            Reintentar
          </button>
        </div>
      </div>
    </div>
  }

  <!-- Controls Overlay -->
  @if (controls.showControls() && !controls.isLoading() && !controls.hasError()) {
    <app-player-overlay
      [isPaused]="controls.isPaused()"
      [isPlaying]="controls.isPlaying()"
      [contentId]="controls.contentId()"
      [episodeId]="controls.episodeId()"
      [currentTime]="controls.currentTime()"
      [duration]="controls.duration()"
      [buffered]="controls.buffered()"
      [volume]="controls.volume()"
      [muted]="controls.muted()"
      [isFullscreen]="controls.isFullscreen()"
      [speed]="controls.speed()"
      [quality]="controls.quality()"
      [showSpeedMenu]="controls.showSpeedMenu()"
      [showQualityMenu]="controls.showQualityMenu()"
      (backClick)="goBack()"
      (playClick)="togglePlay()"
      (playPause)="togglePlay()"
      (seek)="seek($event)"
      (skip)="skip($event)"
      (muteToggle)="toggleMute()"
      (volumeChange)="setVolume($event)"
      (fullscreenToggle)="toggleFullscreen()"
      (speedMenuToggle)="controls.toggleSpeedMenu()"
      (qualityMenuToggle)="controls.toggleQualityMenu()"
      (speedChange)="setSpeed($event)"
      (qualityChange)="setQuality($event)"
      (menusClose)="controls.closeMenus()"
    ></app-player-overlay>
  }
</div>
