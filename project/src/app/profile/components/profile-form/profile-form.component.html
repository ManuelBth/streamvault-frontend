<div class="profile-form-container">
  <h2 class="form-title">
    {{ isEditing() ? 'Editar Perfil' : 'Nuevo Perfil' }}
  </h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="profile-form">
    <div class="form-group avatar-section">
      <app-profile-avatar
        [avatarUrl]="form.get('avatarUrl')?.value"
        (avatarChange)="onAvatarChange($event)"
      />
    </div>

    <div class="form-group">
      <label for="name" class="form-label">Nombre del perfil</label>
      <input
        type="text"
        id="name"
        formControlName="name"
        class="form-input"
        [class.error]="nameControl?.touched && nameControl?.invalid"
        placeholder="Ej: Principal, Niño, Familia"
      />
      @if (nameError) {
        <span class="error-message">{{ nameError }}</span>
      }
    </div>

    <div class="form-actions">
      <button 
        type="button" 
        class="btn-cancel"
        (click)="onCancel()"
      >
        Cancelar
      </button>
      <button 
        type="submit" 
        class="btn-submit"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          Guardando...
        } @else {
          {{ isEditing() ? 'Guardar cambios' : 'Crear perfil' }}
        }
      </button>
    </div>
  </form>
</div>
