<div 
  class="profile-card" 
  [class.selected]="isSelected()"
  [class.small]="size() === 'small'"
  [class.large]="size() === 'large'"
  (click)="handleSelect()"
>
  <div class="avatar-container">
    @if (getAvatarUrl()) {
      <img [src]="getAvatarUrl()" [alt]="profile().name" class="avatar-img" />
    } @else {
      <div class="avatar-placeholder">
        {{ getInitials() }}
      </div>
    }
    
    @if (isSelected()) {
      <div class="selected-indicator">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
    }
  </div>
  
  <span class="profile-name">{{ profile().name }}</span>
  
  <div class="profile-actions" (click)="$event.stopPropagation()">
    <button class="action-btn edit" (click)="handleEdit($event)" title="Editar">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    </button>
    <button class="action-btn delete" (click)="handleDelete($event)" title="Eliminar">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </button>
  </div>
</div>
