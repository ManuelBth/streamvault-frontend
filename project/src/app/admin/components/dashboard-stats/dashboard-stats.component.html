<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon">
      <span class="material-icons">people</span>
    </div>
    <div class="stat-content">
      <p class="stat-label">Total de Usuarios</p>
      <p class="stat-value">{{ stats().totalUsers }}</p>
    </div>
  </div>
  
  <div class="stat-card">
    <div class="stat-icon">
      <span class="material-icons">movie</span>
    </div>
    <div class="stat-content">
      <p class="stat-label">Contenido Total</p>
      <p class="stat-value">{{ stats().totalContent }}</p>
    </div>
  </div>
  
  <div class="stat-card">
    <div class="stat-icon">
      <span class="material-icons">subscriptions</span>
    </div>
    <div class="stat-content">
      <p class="stat-label">Suscripciones Activas</p>
      <p class="stat-value">{{ stats().activeSubscriptions }}</p>
    </div>
  </div>
</div>
